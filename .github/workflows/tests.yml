name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  db-backed-suites:
    # Task 10 safeguard: confirm the DB-backed pytest suites coexist.
    #
    # Two suites truncate TEST_DATABASE_URL (tests/test_phase4.py and
    # tests/test_automations/conftest.py); when they run in the same
    # pytest-xdist session they used to race each other on a shared DB.
    # tests/_pg_test_db.resolve_test_db_url() hands each worker its own
    # per-worker DB. This job runs the full validation list serially
    # (authoritative correctness) AND re-runs it under -n 2 to exercise
    # the isolation path. A regression in either mode fails the build.
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sparkle_shine_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sparkle_shine_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-xdist

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            PGPASSWORD=postgres pg_isready -h localhost -U postgres && exit 0
            sleep 1
          done
          echo "Postgres never became ready"; exit 1

      - name: Run validation suites serially
        run: |
          python -m pytest -q \
            tests/test_phase4.py \
            tests/test_revenue_orphan_exclusion.py \
            tests/test_audit_orphan_invoices.py \
            tests/test_invoice_remediation.py \
            tests/test_remediate_mispriced_invoices.py \
            tests/test_automations/test_job_completion_flow.py \
            tests/test_track_e_commercial_agreements.py \
            tests/test_reconcile_commercial_agreements.py \
            tests/test_metrics_integrity.py

      - name: Re-run under pytest-xdist to exercise per-worker DB isolation
        # If two workers ever share one DB, the truncates race and this
        # step fails with flaky teardown errors. That's the signal Task 7
        # is regressing.
        run: |
          python -m pytest -q -n 2 \
            tests/test_phase4.py \
            tests/test_automations/test_job_completion_flow.py \
            tests/test_reconcile_commercial_agreements.py \
            tests/test_metrics_integrity.py
